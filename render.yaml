services:
  - type: web
    name: jimbo-connect-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false  # set in Render dashboard (Atlas connection string)
      - key: DB_NAME
        value: jimbo_connect
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@jimboconnect.com
      - key: ADMIN_PASSWORD
        sync: false  # set in Render dashboard
      - key: FRONTEND_URL
        sync: false  # set to your deployed frontend URL (Vercel or Render Static)
      - key: RESEND_API_KEY
        sync: false  # paste from resend.com → API Keys
      - key: EMAIL_FROM
        value: "Jimbo Connect <onboarding@resend.dev>"

  - type: web
    name: jimbo-connect-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: yarn install && yarn build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false  # set to https://jimbo-connect-api.onrender.com (or your custom URL)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
