name: Keep API warm

# Render free-tier web services spin down after ~15 min of inactivity, and the
# next request triggers a ~40s cold boot. During that window a browser fetch
# (e.g. the login POST) can fail with net::ERR_FAILED. This workflow pings the
# API health endpoint on a schedule so the service stays warm during the day.
#
# Caveats:
#   - GitHub disables scheduled workflows after 60 days of no repo activity.
#   - Scheduled runs can be delayed several minutes under GitHub load.
#   - This does not guarantee zero cold starts, but removes most of them.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Newer pings make older queued ones irrelevant.
concurrency:
  group: keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS \
            --max-time 90 \
            --retry 4 \
            --retry-all-errors \
            --retry-delay 15 \
            https://jimbo-connect-api.onrender.com/api/health
